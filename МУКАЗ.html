  // 1. Создай проект на https://supabase.com (бесплатно)
  // 2. В SQL Editor выполни:
  //
  //    create table sklad_kv (
  //      key text primary key,
  //      value jsonb not null,
  //      updated_at timestamptz default now()
  //    );
  //    alter table sklad_kv enable row level security;
  //    create policy "allow all" on sklad_kv for all using (true) with check (true);
  //
  // 3. В Project Settings -> API скопируй "Project URL" и "anon public" ключ,
  //    вставь их сюда:

  const SUPABASE_URL = 'https://rcnadtsjjnsprbntsrtm.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_3PkNY-h8Mc_xLYRbOwX7XQ_2HAsEBWf';

  const STORAGE_TABLE = 'sklad_kv';

  // Адрес Cloudflare Worker — прокси к WB Content API (для печати этикеток).
  // Получи URL после деплоя воркера wb-cards-worker.js и впиши сюда.
  const WB_PROXY_URL = 'https://shrill-term-ab11.tsplogisticgroup.workers.dev';

  window.storage = {
    async get(key) {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/${STORAGE_TABLE}?key=eq.${encodeURIComponent(key)}&select=value`,
        { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
      );
      if (!res.ok) throw new Error('storage get failed: ' + res.status);
      const rows = await res.json();
      if (!rows.length) return null;
      return { key, value: JSON.stringify(rows[0].value), shared: true };
    },
    async set(key, value) {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/${STORAGE_TABLE}?on_conflict=key`,
        {
          method: 'POST',
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json',
            Prefer: 'resolution=merge-duplicates,return=minimal',
          },
          body: JSON.stringify({ key, value: JSON.parse(value), updated_at: new Date().toISOString() }),
        }
      );
      if (!res.ok) throw new Error('storage set failed: ' + res.status);
      return { key, value, shared: true };
    },
    async delete(key) {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/${STORAGE_TABLE}?key=eq.${encodeURIComponent(key)}`,
        { method: 'DELETE', headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
      );
      return res.ok;
    },
    async listByPrefix(prefix) {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/${STORAGE_TABLE}?key=like.${encodeURIComponent(prefix)}*&select=key,updated_at&order=key.desc`,
        { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
      );
      if (!res.ok) throw new Error('storage list failed: ' + res.status);
      return res.json();
    },
  };
</script>

// --- Парсер "Акт приёмки товара" Wildberries ---
function parseAkt(workbook, fileName) {
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(sheet, {
    header: 1,
    defval: ''
  });
  let headerIdx = -1;
  for (let i = 0; i < json.length; i++) {
    if (json[i].some(c => String(c).toLowerCase().includes('шк короба'))) {
      headerIdx = i;
      break;
    }
  }
  if (headerIdx < 0) return null;
  const headers = json[headerIdx].map(c => String(c).toLowerCase());
  const artIdx = headers.findIndex(h => h.includes('артикул продавца'));
  const sizeIdx = headers.findIndex(h => h.includes('сорт'));
  const boxIdx = headers.findIndex(h => h.includes('шк короба'));
  const qtyIdx = headers.findIndex(h => h.includes('кол-во'));
  if (artIdx < 0 || sizeIdx < 0 || boxIdx < 0 || qtyIdx < 0) return null;
  let shipmentNumber = '';
  for (let i = 0; i < Math.min(json.length, 6) && !shipmentNumber; i++) {
    for (const cell of json[i]) {
      if (typeof cell === 'string') {
        const m = cell.match(/№\s*(\d+)/);
        if (m) {
          shipmentNumber = m[1];
          break;
        }
      }
    }
  }
  if (!shipmentNumber) {
    const m = fileName.match(/(\d{6,})/);
    if (m) shipmentNumber = m[1];
  }
  let date = todayISO();
  for (let i = 0; i < Math.min(json.length, 6); i++) {
    for (const cell of json[i]) {
      if (typeof cell === 'string') {
        const m = cell.match(/(\d{1,2})\D+(\d{1,2})\D+(\d{4})/);
        if (m) date = `${m[3]}-${m[2].padStart(2, '0')}-${m[1].padStart(2, '0')}`;
      }
    }
  }
  const items = [];
